apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: woodpantry
  labels:
    app: ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: ghcr.io/mwhite7112/woodpantry-ingestion:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
            - name: DICTIONARY_URL
              value: "http://ingredients.woodpantry.svc.cluster.local"
            - name: RECIPE_URL
              value: "http://recipes.woodpantry.svc.cluster.local"
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: ingestion-secret
                  key: rabbitmq_url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api_key
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
